name: conflibot
on: pull_request_target

permissions:
  checks: write
  contents: read
  pull-requests: read

jobs:
  conflibot:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v7
      - name: Warn about potential conflicts
        # Run the action from this repository so the workflow always
        # exercises the current code instead of chasing release tags
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          exclude: |
            yarn.lock
