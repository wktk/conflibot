name: "test"
on:
  pull_request:
  push:
    branches:
      - master
      - 'releases/*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn
      - name: Install packages
        run: yarn --frozen-lockfile --ignore-optional
      - run: yarn lint
      - run: yarn format:check
      - run: yarn typecheck
      # Build before testing: the dist smoke test then exercises the
      # bundle produced from the dependencies of this PR
      - run: yarn package
      - run: yarn test
      # Bots (Renovate, Dependabot) cannot rebuild dist in their PRs;
      # update-dist.yml re-syncs it on master right after the merge
      - name: Make sure that the committed package is up to date
        if: ${{ !endsWith(github.actor, '[bot]') }}
        run: git diff --exit-code
