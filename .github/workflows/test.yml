name: "test"
on:
  pull_request:
  push:
    branches:
      - master
      - 'releases/*'

jobs:
  test:
    # ubuntu-latest, not ubuntu-slim: this job compiles and bundles,
    # and slim's single CPU makes it 2-3x slower
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn
      - name: Install packages
        run: yarn --frozen-lockfile
      - run: yarn lint
      - run: yarn format:check
      - run: yarn typecheck
      # Build before testing: the dist smoke test then exercises the
      # bundle produced from this PR's source and dependencies. PRs do
      # not need to commit the rebuilt dist; update-dist.yml re-syncs
      # it on master after each merge.
      - run: yarn package
      - run: yarn test
