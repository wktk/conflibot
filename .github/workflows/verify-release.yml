# PRs do not commit a rebuilt dist (update-dist.yml syncs it on master
# after each merge), so a tag cut too early could point at a commit
# whose dist does not match its source. Rebuild and compare to catch
# that before anyone runs the broken tag.
name: verify-release
on:
  push:
    tags:
      - 'v*'

jobs:
  verify:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install packages
        run: |
          npm install -g yarn
          yarn --frozen-lockfile
      - run: yarn package
      - name: Verify the tagged dist matches its source
        run: git diff --exit-code
